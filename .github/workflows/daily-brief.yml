name: Daily Morning Brief

# Runs daily at 05:23 UTC (06:23 BST / 05:23 GMT).
# Off-peak minute to dodge GitHub's scheduled-workflow delay; brief arrives on Joel's phone
# around 06:00–07:30 UK even with 30–90 min platform delay.
# Manual trigger via Actions tab also enabled for testing.

on:
  schedule:
    - cron: '23 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Send brief
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_QUIZ_TABLE_ID: ${{ secrets.AIRTABLE_QUIZ_TABLE_ID }}
          MAILERLITE_API_KEY: ${{ secrets.MAILERLITE_API_KEY }}
        run: node scripts/daily-brief.mjs
